version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "Installing Maven 3.9.8..."
      - wget https://archive.apache.org/dist/maven/maven-3/3.9.8/binaries/apache-maven-3.9.8-bin.tar.gz
      - tar xzf apache-maven-3.9.8-bin.tar.gz
  
  pre_build:
    commands:
      - echo "Updating application.properties with Environment Variables..."
      - sed -i "s/jdbc.password=admin123/jdbc.password=${DB_PASSWORD}/" src/main/resources/application.properties
      - sed -i "s/jdbc.username=admin/jdbc.username=${DB_USERNAME}/" src/main/resources/application.properties
      - sed -i "s/db01:3306/${DB_ENDPOINT}:3306/" src/main/resources/application.properties
  
  build:
    commands:
      - echo "Starting Maven Build..."
      - mvn clean install  # 'clean' ensures a fresh build every time

  post_build:
    commands:
      - echo "Build completed on $(date)"

artifacts:
  files:
    - '**/*'
  base-directory: 'target/vprofile-v2'
